x-base: &base
  build: .
  working_dir: /workspace
  ipc: host
  shm_size: "16gb"
  environment:
    HF_TOKEN: ${HF_TOKEN:-}
  volumes:
    - ./:/workspace
    - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  train:
    <<: *base
    command: ["train", "--hackathon", "${HACKATHON:-}", "--epochs", "${EPOCHS:-3}", "--batch-size", "${BATCH_SIZE:-32}", "--gradient-accumulation-steps", "${GRAD_ACCUM:-1}", "--learning-rate", "${LR:-3e-4}", "--max-seq-length", "${MAX_SEQ_LENGTH:-16384}"]

  evaluate:
    <<: *base
    command: ["evaluate", "${ADAPTER:-./hackathon_judge_lora}"]
